<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add a carousel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar shadow-sm navbar-expand-lg bg-body-tertiary fixed-top">
  <div class="container-fluid">
      <a class="nav-link ms-2" href="{% url 'home' %}">
          <i class="bi bi-camera fs-3" style="margin-right: 10px"></i>
      </a>
    <a class="navbar-brand fw-bolder" href="{% url 'home' %}">Brane Photography</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="navbarNavAltMarkup">
      <div class="navbar-nav">
        <a class="nav-link active" aria-current="page" href="{% url 'home' %}">Home</a>
          <a class="nav-link" href="{% url 'gallery' %}">Gallery</a>
        <a class="nav-link" href="{% url 'contact' %}">Contact</a>
        <a class="nav-link" href="#">About me</a>
      </div>
    </div>
  </div>
</nav>

<div class="container-fluid justify-content-center p-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-4 border border-black justify-content-center" style="border-radius: 10px;background: white">
            <form method="post" action="{% url 'add_carousel' %}" enctype="multipart/form-data">
    <h1 class="text-dark text-center" style="font-weight: bold">Add new Carousel</h1>
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn w-100 btn-dark mb-3">Submit</button>
</form>
        </div>
    </div>
</div>

<div class="container-fluid">
    <footer class="row d-flex justify-content-center align-items-center mt-3" style="background: black;height: 50px;">
    <div class="col d-flex justify-content-center align-items-center">
        <p class="text-light m-0">&copy; Brane Photography</p>
    </div>
</footer>
    
</div>

</body>
</html>
