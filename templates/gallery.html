<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gallery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar shadow-sm navbar-expand-lg bg-body-tertiary fixed-top mb-5" style="margin-bottom: 20px">
  <div class="container-fluid">
      <a class="nav-link ms-2" href="{% url 'home' %}">
          <i class="bi bi-camera fs-3" style="margin-right: 10px"></i>
      </a>
    <a class="navbar-brand fw-bolder" href="{% url 'home' %}">Brane Photography</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="navbarNavAltMarkup">
      <div class="navbar-nav">
        <a class="nav-link active" aria-current="page" href="{% url 'home' %}">Home</a>
          <a class="nav-link" href="{% url 'gallery' %}">Gallery</a>
        <a class="nav-link" href="{% url 'contact' %}">Contact</a>
        <a class="nav-link" href="#">About me</a>
      </div>
    </div>
  </div>
</nav>

<div class="container-fluid d-flex justify-content-center align-content-center" style="background-image: url('https://images.pexels.com/photos/763097/pexels-photo-763097.jpeg');background-size: cover;background-position: center;height: 675px" >
    <div class="row d-flex justify-content-center align-content-center">
        <div class="col d-flex justify-content-center align-content-center p-5">
            <h1 class="text-light display-2">Welcome to the art of visual storytelling</h1>
        </div>
    </div>
</div>

<div class="container-fluid align-content-center justify-content-center bg-black" style="width: 400px;border-radius: 10px;margin-top: 15px">
    <h1 class="text text-light text-center p-2 display-6">Complete Gallery</h1>
</div>

<div class="container-fluid" style="border-radius: 30px">
  <div class="row d-flex justify-content-center">
    <div class="col-10">
      {% for carousel in carousels %}
        <img src="{{ carousel.image.url }}" class="card-img-top mt-3" alt="..." style="height: auto; max-height: 450px; object-fit: cover; border-top-left-radius: 20px;border-top-right-radius: 20px;border: black">

        <div class="bg-black text-light d-flex flex-column align-items-center justify-content-center p-3" style="border-bottom-right-radius: 20px;border-bottom-left-radius: 20px">
          <p class="fs-3 m-0 display-6 mb-2">{{ carousel.title }}</p>
          <a class="btn btn-light mt-2" style="width: 450px" href="{% url 'carousel' carousel.id %}">View</a>
        </div>

      {% endfor %}
    </div>
  </div>
</div>


<div class="container-fluid">
    <footer class="row d-flex justify-content-center align-items-center mt-3" style="background: black;height: 50px;">
    <div class="col d-flex justify-content-center align-items-center">
        <p class="text-light m-0">&copy; Brane Photography</p>
    </div>
</footer>
</div>

</body>
</html>
